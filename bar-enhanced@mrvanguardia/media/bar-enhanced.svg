<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.2"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background rounded rectangle -->
  <rect width="256" height="256" rx="56" fill="url(#bg)"/>
  
  <!-- Enhanced GNOME Top Bar representation -->
  <rect x="24" y="64" width="208" height="40" rx="20" fill="url(#barGrad)" filter="url(#shadow)"/>
  
  <!-- UI elements on the bar -->
  <circle cx="54" cy="84" r="6" fill="#11998e" opacity="0.8"/>
  <circle cx="76" cy="84" r="6" fill="#11998e" opacity="0.6"/>
  <circle cx="98" cy="84" r="6" fill="#11998e" opacity="0.4"/>
  
  <!-- Magic sparkles / enhancement icon -->
  <g filter="url(#glow)">
    <path d="M128 120 L136 150 L166 158 L136 166 L128 196 L120 166 L90 158 L120 150 Z" fill="#ffffff" filter="url(#shadow)"/>
    <path d="M180 180 L184 192 L196 196 L184 200 L180 212 L176 200 L164 196 L176 192 Z" fill="#ffffff" opacity="0.9"/>
    <path d="M80 180 L83 189 L92 192 L83 195 L80 204 L77 195 L68 192 L77 189 Z" fill="#ffffff" opacity="0.8"/>
  </g>
</svg>
